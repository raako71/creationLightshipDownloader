<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f3460" />
  <meta name="description" content="Browse Creation Lightship archive recordings for today and yesterday." />
  <title>Creation Lightship</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    /* ── reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1a1a2e;
      --surface:    #16213e;
      --accent:     #0f3460;
      --highlight:  #e94560;
      --text:       #eaeaea;
      --muted:      #888;
      --link:       #e94560;
      --link-hover: #ff7b8a;
      --radius:     8px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── app header ────────────────────────────────────────────────────── */
    header {
      background: var(--accent);
      padding: 0.75rem 1.5rem;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
    }

    /* ── two-column layout ─────────────────────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--accent); /* gap colour */
    }

    .column {
      background: var(--surface);
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* ── column headings ───────────────────────────────────────────────── */
    .column h2 {
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--highlight);
      border-bottom: 1px solid var(--accent);
      padding-bottom: 0.5rem;
      margin-bottom: 0.25rem;
    }

    /* ── status line ───────────────────────────────────────────────────── */
    .status {
      font-size: 0.78rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    /* ── year links ────────────────────────────────────────────────────── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .links a {
      display: block;
      color: var(--link);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.3rem 0.4rem;
      border-radius: var(--radius);
      transition: background 0.15s, color 0.15s;
    }

    .links a:hover,
    .links a:focus {
      background: var(--accent);
      color: var(--link-hover);
      outline: none;
    }

    /* ── responsive: stack on narrow screens ───────────────────────────── */
    @media (max-width: 480px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>Creation Lightship Archive</header>

  <main>
    <!-- Yesterday column -->
    <div class="column">
      <h2 id="yesterday-title">yesterday</h2>
      <p class="status" id="yesterday-status"></p>
      <div class="links" id="yesterday-links"></div>
    </div>

    <!-- Today column -->
    <div class="column">
      <h2 id="today-title">today</h2>
      <p class="status" id="today-status"></p>
      <div class="links" id="today-links"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
